## Aegis self-hosted stack.
##
## Four services, one network, one volume. Everything below is driven by
## the four env vars documented in docs/self-host.md:
##
##   POSTGRES_PASSWORD   — database superuser password
##   JWT_SECRET          — HS256 signing secret for PostgREST / GoTrue
##   ANON_KEY            — JWT signed with JWT_SECRET, role=anon
##   SERVICE_ROLE_KEY    — JWT signed with JWT_SECRET, role=service_role
##
## `docker compose up -d` boots Postgres, applies every migration under
## ../supabase/migrations, exposes a PostgREST Data API on :3000, and
## serves GoTrue auth on :9999. Point the Aegis web client at those two
## URLs (see docs/self-host.md) and you have a private vault.

name: aegis

volumes:
  aegis-db-data:

networks:
  aegis:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: aegis
    volumes:
      - aegis-db-data:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d:ro
      - ./init/00-roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [aegis]

  # PostgREST — the same wire protocol Supabase's Data API speaks, so the
  # existing @supabase/supabase-js client works with zero code changes.
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/aegis
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PGRST_JWT_AUD: authenticated
    ports:
      - "3000:3000"
    networks: [aegis]

  # GoTrue — Supabase Auth, self-hosted. Email/password only by default;
  # add SMTP or OAuth by extending the env block per the GoTrue README.
  auth:
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/aegis?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:5173}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
    ports:
      - "9999:9999"
    networks: [aegis]

  # One-shot migration runner. Every SQL file under supabase/migrations
  # is applied in filename order on startup, then the container exits 0.
  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../supabase/migrations:/migrations:ro
      - ./init/apply-migrations.sh:/apply.sh:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "/apply.sh"]
    networks: [aegis]
    restart: "no"
